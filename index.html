<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cat and Mouse</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Cat and Mouse"></canvas>
      <button id="playShopButton" class="shop-button play-shop-button is-hidden" type="button" aria-label="Kauppa">
        <span class="shop-image" aria-hidden="true">
          <span class="shop-awning"></span>
          <span class="shop-window"></span>
          <span class="shop-door"></span>
        </span>
      </button>
      <div id="overlay" class="overlay">
        <div id="overlayTitle" class="overlay-title">Cat and Mouse</div>
        <input id="playerNameInput" class="player-name-input" type="text" maxlength="18" autocomplete="nickname" aria-label="Pelaajan nimi" placeholder="PELAAJAN NIMI">
        <div id="levelSelect" class="level-select" aria-label="Tason valinta"></div>
        <div id="cheeseBank" class="cheese-bank" aria-label="Juustot">
          <span class="cheese-mark" aria-hidden="true"></span>
          <span id="cheeseCount">0</span>
        </div>
        <button id="startButton" class="start-button" type="button">START</button>
        <button id="shopButton" class="shop-button" type="button" aria-label="Kauppa">
          <span class="shop-image" aria-hidden="true">
            <span class="shop-awning"></span>
            <span class="shop-window"></span>
            <span class="shop-door"></span>
          </span>
        </button>
        <div id="shopPanel" class="shop-panel is-hidden" role="dialog" aria-label="Hiiren kauppa">
          <button id="shopCloseButton" class="shop-close-button" type="button" aria-label="Sulje kauppa">X</button>
          <div class="shop-cheese">
            <span class="cheese-mark" aria-hidden="true"></span>
            <span id="shopCheeseCount">0</span>
          </div>
          <canvas id="shopPreview" class="shop-preview" width="260" height="170" aria-label="Hiiri"></canvas>
          <div id="shopItems" class="shop-items" aria-label="Hatut"></div>
        </div>
      </div>
    </main>
    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-save.js"></script>
    <script src="game.js"></script>
  </body>
</html>
