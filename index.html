<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cat and Mouse</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Cat and Mouse"></canvas>
      <div id="overlay" class="overlay">
        <div id="overlayTitle" class="overlay-title">Cat and Mouse</div>
        <div id="levelSelect" class="level-select" aria-label="Tason valinta"></div>
        <div id="cheeseBank" class="cheese-bank" aria-label="Juustot">
          <span class="cheese-mark" aria-hidden="true"></span>
          <span id="cheeseCount">0/10</span>
        </div>
        <button id="startButton" class="start-button" type="button">START</button>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
